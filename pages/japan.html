.container{

.food-grid{
display:grid;

.food-card{
text-decoration:none;

.circle{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid #ff7043;

.circle img{
width:100%;
height:100%;

}

.food-name{

.contact{
margin-top:30px;
padding:15px;
background:#333;
color:white;

/* Search bar container */
.search-box{
    text-align:center;
}

/* Input field */
.search-box input{
    width:300px;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Search button */
.search-box button{
    padding:10px 15px;
    font-size:16px;
    background-color:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.search-box button:hover{
    background-color:#45a049;
}


/* Remove default margin */
body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* Menu bar background */
.navbar{
    background-color:#333;
    overflow:hidden;
}

/* Menu links */
.navbar a{
    float:left;
    color:white;
    text-align:center;
    padding:14px 20px;
    text-decoration:none;
    font-size:17px;
}

/* Hover effect */
.navbar a:hover{
    background-color:#ddd;
    color:black;
}

/* Active link */
.navbar a.active{
    background-color:#04AA6D;
    color:white;
}

.back-button {
float:left;
font-size: 32px;

padding: 8px 12px;

cursor: pointer;

text-decoration:none;

border: none;

background-color: none;
color:black;

border-radius: 4px;

}

.back-button:hover {

background-color: #ddd;
}


</style>
