<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food HUB</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:#ff7043;
color:black;
padding:20px;
font-size:32px;
font-weight:bold;
}

.description{
margin:20px;
color:#555;
}

.container{
width:80%;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.food-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.food-card{
text-decoration:none;
color:black;
}

.circle{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid #ff7043;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

.food-name{
margin-top:10px;
font-weight:bold;
}

.contact{
margin-top:30px;
padding:15px;
background:#333;
color:white;
}




/* Remove default margin */
body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* Menu bar background */
.navbar{
    background-color:#333;
    overflow:hidden;
}

/* Menu links */
.navbar a{
    float:left;
    color:white;
    text-align:center;
    padding:14px 20px;
    text-decoration:none;
    font-size:17px;
}

/* Hover effect */
.navbar a:hover{
    background-color:#ddd;
    color:black;
}

/* Active link */
.navbar a.active{
    background-color:#04AA6D;
    color:white;
}




/* Search bar container */
.search-box{
    text-align:center;
}

/* Input field */
.search-box input{
    width:300px;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Search button */
.search-box button{
    padding:10px 15px;
    font-size:16px;
    background-color:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.search-box button:hover{
    background-color:#45a049;
}


</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>Food HUB</header>

<p class="description">
Explore foods from different countries around the world.
</p>

<div class="navbar">
    <a class="active" href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
</div>


<!-- Page Content -->
<div style="padding:20px;">

 <input type="text" id="search" placeholder="Search food..." onkeyup="searchFood()">

</body>
</html>
